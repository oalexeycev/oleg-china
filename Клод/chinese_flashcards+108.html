<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉字 · Карточки</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1008;
    --paper: #f5efe4;
    --red: #c0392b;
    --gold: #b8963e;
    --gray: #8a7a6a;
    --card-bg: #faf6ee;
    --green: #27ae60;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    background-image:
      radial-gradient(ellipse at 80% 10%, rgba(184,150,62,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 20% 90%, rgba(192,57,43,0.05) 0%, transparent 40%);
  }

  header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.8s ease both;
  }
  header h1 {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 700;
    letter-spacing: 0.15em;
    line-height: 1;
  }
  header p {
    font-size: 1.1rem;
    font-style: italic;
    color: var(--gray);
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  /* ══ MODE SELECT ══ */
  #mode-select {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    animation: fadeUp 0.9s ease both;
    width: 100%;
    max-width: 420px;
  }
  .mode-label {
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 4px;
  }
  .mode-btn {
    width: 100%;
    padding: 20px 24px;
    border-radius: 14px;
    cursor: pointer;
    border: none;
    display: flex;
    align-items: center;
    gap: 18px;
    text-align: left;
    transition: transform 0.2s, box-shadow 0.2s;
    font-family: 'Cormorant Garamond', serif;
  }
  .mode-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(26,16,8,0.13); }
  .mode-icon {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 2rem;
    line-height: 1;
    flex-shrink: 0;
    width: 44px;
    text-align: center;
  }
  .mode-info h3 { font-size: 1.25rem; font-weight: 400; letter-spacing: 0.05em; margin-bottom: 3px; }
  .mode-info p  { font-size: 0.88rem; font-style: italic; opacity: 0.7; }
  .mode-study {
    background: var(--card-bg);
    box-shadow: 0 4px 20px rgba(26,16,8,0.08), inset 0 0 0 1px rgba(184,150,62,0.25);
    color: var(--ink);
  }
  .mode-practice {
    background: var(--ink);
    box-shadow: 0 4px 20px rgba(26,16,8,0.15);
    color: var(--paper);
  }
  .mode-practice .mode-info p { color: rgba(245,239,228,0.6); }
  .mode-match {
    background: linear-gradient(135deg, #2c1a0e 0%, #3d2410 100%);
    box-shadow: 0 4px 20px rgba(26,16,8,0.18);
    color: var(--paper);
    border: 1px solid rgba(184,150,62,0.3);
  }
  .mode-match .mode-info p { color: rgba(245,239,228,0.6); }

  /* ══ GROUP SELECT ══ */
  #group-select {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 480px;
    animation: fadeUp 0.8s ease both;
  }
  #group-select.active { display: flex; }
  .group-label {
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 2px;
  }
  .group-grid {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .group-btn {
    padding: 14px 12px;
    border-radius: 12px;
    cursor: pointer;
    border: none;
    background: var(--card-bg);
    box-shadow: 0 2px 12px rgba(26,16,8,0.07), inset 0 0 0 1px rgba(184,150,62,0.2);
    text-align: center;
    transition: transform 0.2s, box-shadow 0.2s;
    font-family: 'Cormorant Garamond', serif;
  }
  .group-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,16,8,0.12), inset 0 0 0 1.5px rgba(184,150,62,0.35); }
  .group-btn .group-num {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 6px;
  }
  .group-btn .group-chars {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 1.15rem;
    color: var(--ink);
    letter-spacing: 0.08em;
    line-height: 1.6;
  }
  .group-btn-all {
    grid-column: 1 / -1;
    padding: 16px 12px;
    border-radius: 12px;
    cursor: pointer;
    border: none;
    background: var(--ink);
    color: var(--paper);
    box-shadow: 0 4px 18px rgba(26,16,8,0.15);
    text-align: center;
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    letter-spacing: 0.08em;
  }
  .group-btn-all:hover { background: var(--gold); color: var(--ink); transform: translateY(-2px); box-shadow: 0 8px 22px rgba(184,150,62,0.28); }
  .group-back {
    font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--gray); cursor: pointer; background: none; border: none;
    font-family: 'Cormorant Garamond', serif; padding: 4px 0; transition: color 0.2s;
    align-self: flex-start;
  }
  .group-back:hover { color: var(--ink); }

  /* ══ SCREENS ══ */
  .screen { display: none; width: 100%; max-width: 480px; flex-direction: column; align-items: center; }
  .screen.active { display: flex; }

  .screen-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    margin-bottom: 24px;
    animation: fadeDown 0.7s ease both;
  }
  .nav-back {
    font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--gray); cursor: pointer; background: none; border: none;
    font-family: 'Cormorant Garamond', serif; padding: 4px 0; transition: color 0.2s;
  }
  .nav-back:hover { color: var(--ink); }
  .nav-mode-tag {
    font-size: 0.75rem; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 5px 12px; border-radius: 20px;
  }
  .tag-study    { background: rgba(184,150,62,0.12); color: var(--gold); }
  .tag-practice { background: rgba(26,16,8,0.08); color: var(--ink); }
  .tag-match    { background: rgba(39,174,96,0.12); color: var(--green); }

  /* progress */
  .progress-bar-wrap { width: 100%; margin-bottom: 24px; animation: fadeDown 0.8s ease both; }
  .progress-info {
    display: flex; justify-content: space-between;
    font-size: 0.82rem; color: var(--gray); margin-bottom: 7px;
    letter-spacing: 0.07em; text-transform: uppercase;
  }
  .progress-track { height: 3px; background: rgba(138,122,106,0.2); border-radius: 2px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--gold), var(--red));
    border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  /* flip card */
  .scene {
    width: 100%; max-width: 420px; height: 300px;
    perspective: 1200px; cursor: pointer; animation: fadeUp 0.9s ease both;
  }
  .card {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d; transition: transform 0.7s cubic-bezier(.4,0,.2,1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: 16px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: var(--card-bg);
    box-shadow: 0 2px 4px rgba(26,16,8,0.06), 0 12px 40px rgba(26,16,8,0.1), inset 0 0 0 1px rgba(184,150,62,0.25);
  }
  .face::before {
    content: ''; position: absolute; inset: 10px; border-radius: 10px;
    border: 1px solid rgba(184,150,62,0.15); pointer-events: none;
  }
  .face.back { transform: rotateY(180deg); }
  .hanzi {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: clamp(3rem, 10vw, 5rem); line-height: 1;
    color: var(--ink); text-shadow: 2px 3px 8px rgba(26,16,8,0.12);
    transition: transform 0.2s; user-select: none;
  }
  .scene:hover .hanzi { transform: scale(1.04); }
  .card-hint { margin-top: 14px; font-size: 0.65rem; color: var(--gray); letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.5; }
  .pinyin { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-style: italic; color: var(--red); margin-bottom: 6px; letter-spacing: 0.05em; }
  .translation { font-size: 1.55rem; font-weight: 300; color: var(--ink); letter-spacing: 0.03em; margin-bottom: 5px; }
  .examples { display: flex; flex-direction: column; gap: 5px; padding: 0 18px; margin-top: 2px; }
  .example-item { font-size: 0.8rem; color: var(--gray); font-style: italic; text-align: center; line-height: 1.4; }
  .example-item::before { content: "· "; color: var(--gold); font-style: normal; }
  .stroke-order { font-family: 'Noto Sans SC', sans-serif; font-size: 0.95rem; color: var(--gold); margin-top: 8px; letter-spacing: 0.1em; }

  /* buttons */
  .btn {
    font-family: 'Cormorant Garamond', serif; font-size: 0.95rem;
    letter-spacing: 0.1em; text-transform: uppercase; border: none;
    border-radius: 8px; cursor: pointer; padding: 11px 24px; transition: all 0.2s;
  }
  .btn-ghost { background: transparent; color: var(--gray); border: 1.5px solid rgba(138,122,106,0.35); }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
  .btn-dark  { background: var(--ink); color: var(--paper); }
  .btn-dark:hover { background: var(--gold); color: var(--ink); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(184,150,62,0.28); }
  .btn-wrong { background: transparent; color: var(--red); border: 1.5px solid var(--red); }
  .btn-wrong:hover { background: var(--red); color: white; transform: translateY(-1px); }
  .btn-right { background: var(--ink); color: var(--paper); }
  .btn-right:hover { background: var(--gold); color: var(--ink); transform: translateY(-1px); }
  .btn-restart { background: var(--ink); color: var(--paper); }
  .btn-restart:hover { background: var(--red); transform: translateY(-2px); box-shadow: 0 8px 22px rgba(192,57,43,0.28); }
  .btn-menu { background: transparent; color: var(--gray); border: 1.5px solid rgba(138,122,106,0.35); }
  .btn-menu:hover { border-color: var(--gold); color: var(--gold); }

  .controls-row { display: flex; gap: 12px; margin-top: 22px; animation: fadeUp 1s ease both; flex-wrap: wrap; justify-content: center; }

  /* study arrows */
  .study-nav { display: flex; align-items: center; gap: 18px; margin-top: 22px; animation: fadeUp 1s ease both; }
  .nav-arrow {
    width: 42px; height: 42px; border-radius: 50%;
    background: transparent; border: 1.5px solid rgba(138,122,106,0.35);
    font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; color: var(--gray); font-family: inherit;
  }
  .nav-arrow:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); transform: scale(1.08); }
  .nav-arrow:disabled { opacity: 0.22; cursor: default; }
  .nav-counter { font-size: 1rem; color: var(--gray); letter-spacing: 0.08em; min-width: 56px; text-align: center; }

  /* dots */
  .dots { display: flex; gap: 7px; margin-top: 18px; animation: fadeUp 1.1s ease both; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(138,122,106,0.22); transition: background 0.3s, transform 0.2s; }
  .dot.known   { background: var(--gold); }
  .dot.unknown { background: rgba(192,57,43,0.4); }
  .dot.matched { background: var(--green); }
  .dot.current { background: var(--ink); transform: scale(1.35); }

  /* result */
  #result-screen { display: none; flex-direction: column; align-items: center; text-align: center; animation: fadeUp 0.8s ease both; max-width: 420px; width: 100%; }
  #result-screen.active { display: flex; }
  .result-hanzi { font-family: 'Noto Sans SC', sans-serif; font-size: 4.5rem; letter-spacing: 0.25em; margin-bottom: 12px; }
  .result-score { font-size: 3.8rem; font-weight: 300; color: var(--gold); margin-bottom: 6px; }
  .result-text  { font-size: 1.3rem; font-style: italic; color: var(--gray); margin-bottom: 28px; line-height: 1.5; max-width: 340px; }
  .result-btns  { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  /* ══ MATCH MODE ══ */
  #match-screen { max-width: 520px; }

  .match-status {
    width: 100%; display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; animation: fadeDown 0.8s ease both;
  }
  .match-pairs-left {
    font-size: 0.82rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray);
  }
  .match-timer {
    font-size: 1.1rem; font-variant-numeric: tabular-nums;
    color: var(--ink); letter-spacing: 0.05em;
  }
  .match-timer.urgent { color: var(--red); animation: pulse 0.6s ease infinite alternate; }

  .match-grid {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    animation: fadeUp 0.9s ease both;
  }

  .match-col { display: flex; flex-direction: column; gap: 10px; }

  .match-tile {
    border-radius: 12px;
    padding: 16px 14px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.2s, opacity 0.3s;
    user-select: none;
    min-height: 64px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  .match-tile.hanzi-tile {
    background: var(--card-bg);
    box-shadow: 0 2px 8px rgba(26,16,8,0.08), inset 0 0 0 1px rgba(184,150,62,0.2);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 1.9rem;
    color: var(--ink);
  }

  .match-tile.meaning-tile {
    background: rgba(26,16,8,0.04);
    box-shadow: 0 2px 8px rgba(26,16,8,0.05), inset 0 0 0 1px rgba(138,122,106,0.2);
    font-size: 1rem;
    color: var(--gray);
    font-style: italic;
    line-height: 1.3;
  }

  .match-tile:hover:not(.matched):not(.wrong-flash) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(26,16,8,0.12);
  }

  .match-tile.selected {
    box-shadow: 0 0 0 2.5px var(--gold), 0 6px 20px rgba(184,150,62,0.25);
    transform: translateY(-2px);
  }
  .match-tile.selected.hanzi-tile  { background: rgba(184,150,62,0.1); }
  .match-tile.selected.meaning-tile { background: rgba(184,150,62,0.08); color: var(--ink); }

  .match-tile.matched {
    background: rgba(39,174,96,0.1) !important;
    box-shadow: 0 0 0 1.5px rgba(39,174,96,0.4) !important;
    color: var(--green) !important;
    cursor: default;
    opacity: 0.75;
  }

  .match-tile.wrong-flash {
    animation: wrongShake 0.4s ease;
    background: rgba(192,57,43,0.1) !important;
    box-shadow: 0 0 0 2px rgba(192,57,43,0.4) !important;
  }

  @keyframes wrongShake {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(-6px); }
    40%  { transform: translateX(6px); }
    60%  { transform: translateX(-4px); }
    80%  { transform: translateX(4px); }
    100% { transform: translateX(0); }
  }
  @keyframes pulse {
    from { opacity: 1; } to { opacity: 0.5; }
  }

  /* misc */
  .hidden { display: none !important; }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-18px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(18px);  } to { opacity:1; transform:translateY(0); } }
  @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.07)} 100%{transform:scale(1)} }
  .pop { animation: pop 0.32s ease; }
</style>
</head>
<body>

<header>
  <h1>汉字</h1>
  <p>Карточки для изучения китайского</p>
</header>

<!-- MODE SELECT -->
<div id="mode-select">
  <div class="mode-label">Выберите режим</div>
  <button class="mode-btn mode-study" onclick="startMode('study')">
    <div class="mode-icon">书</div>
    <div class="mode-info">
      <h3>Изучение</h3>
      <p>Листайте карточки, переворачивайте туда-сюда</p>
    </div>
  </button>
  <button class="mode-btn mode-practice" onclick="startMode('practice')">
    <div class="mode-icon">练</div>
    <div class="mode-info">
      <h3>Тренировка</h3>
      <p>Проверьте себя — знали ли вы каждый иероглиф</p>
    </div>
  </button>
  <button class="mode-btn mode-match" onclick="startMode('match')">
    <div class="mode-icon">对</div>
    <div class="mode-info">
      <h3>Сопоставление</h3>
      <p>Соедините иероглиф с его значением как можно быстрее</p>
    </div>
  </button>
</div>

<!-- GROUP SELECT -->
<div id="group-select">
  <button class="group-back" onclick="goHome()">← Меню</button>
  <div class="group-label" id="group-mode-label">Выберите группу</div>
  <div class="group-grid" id="group-grid"></div>
</div>

<!-- STUDY SCREEN -->
<div id="study-screen" class="screen">
  <div class="screen-nav">
    <button class="nav-back" onclick="goHome()">← Меню</button>
    <span class="nav-mode-tag tag-study">Изучение</span>
  </div>
  <div class="scene" onclick="studyFlip()">
    <div class="card" id="study-card">
      <div class="face front">
        <div class="hanzi" id="study-hanzi">你</div>
        <div class="card-hint">нажмите, чтобы перевернуть</div>
      </div>
      <div class="face back">
        <div class="pinyin"       id="study-pinyin"></div>
        <div class="translation"  id="study-translation"></div>
        <div class="examples"     id="study-examples"></div>
        <div class="stroke-order" id="study-strokes"></div>
        <div class="card-hint" style="margin-top:10px">нажмите снова, чтобы вернуть</div>
      </div>
    </div>
  </div>
  <div class="study-nav">
    <button class="nav-arrow" id="study-prev" onclick="studyNav(-1)">←</button>
    <span class="nav-counter" id="study-counter">1 / 10</span>
    <button class="nav-arrow" id="study-next" onclick="studyNav(1)">→</button>
    <button class="nav-arrow" id="study-shuffle" onclick="studyShuffle()" title="Перемешать">⇄</button>
  </div>
  <div class="dots" id="study-dots"></div>
</div>

<!-- PRACTICE SCREEN -->
<div id="practice-screen" class="screen">
  <div class="screen-nav">
    <button class="nav-back" onclick="goHome()">← Меню</button>
    <span class="nav-mode-tag tag-practice">Тренировка</span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-info">
      <span id="prac-prog-text">Карточка 1 из 10</span>
      <span id="prac-score-text">✓ 0 &nbsp; ✗ 0</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prac-prog-fill" style="width:10%"></div>
    </div>
  </div>
  <div class="scene" onclick="pracFlip()">
    <div class="card" id="prac-card">
      <div class="face front">
        <div class="hanzi" id="prac-hanzi">你</div>
        <div class="card-hint">нажмите, чтобы показать ответ</div>
      </div>
      <div class="face back">
        <div class="pinyin"       id="prac-pinyin"></div>
        <div class="translation"  id="prac-translation"></div>
        <div class="examples"     id="prac-examples"></div>
        <div class="stroke-order" id="prac-strokes"></div>
      </div>
    </div>
  </div>
  <div class="controls-row" id="prac-flip-wrap">
    <button class="btn btn-ghost" onclick="pracFlip()">Показать ответ</button>
  </div>
  <div class="controls-row hidden" id="prac-answer-btns">
    <button class="btn btn-wrong" onclick="pracAnswer(false)">Не знал</button>
    <button class="btn btn-right" onclick="pracAnswer(true)">Знал ✓</button>
  </div>
  <div class="dots" id="prac-dots"></div>
</div>

<!-- MATCH SCREEN -->
<div id="match-screen" class="screen">
  <div class="screen-nav">
    <button class="nav-back" onclick="goHome()">← Меню</button>
    <span class="nav-mode-tag tag-match">Сопоставление</span>
  </div>
  <div class="match-status">
    <span class="match-pairs-left" id="match-pairs-left">Пар осталось: 10</span>
    <span class="match-timer" id="match-timer">0:00</span>
  </div>
  <div class="match-grid" id="match-grid">
    <div class="match-col" id="col-hanzi"></div>
    <div class="match-col" id="col-meaning"></div>
  </div>
  <div class="dots" id="match-dots"></div>
</div>

<!-- RESULT -->
<div id="result-screen">
  <div class="result-hanzi" id="res-hanzi">好！</div>

  { hanzi:'中', pinyin:'zhōng',  translation:'середина, Китай',         strokes:'4 черты',  examples:['中文 zhōngwén — китайский язык','中国 zhōngguó — Китай','中间 zhōngjiān — посередине'] },
  { hanzi:'国', pinyin:'guó',    translation:'страна, государство',    strokes:'8 черт',   examples:['中国 zhōngguó — Китай','国家 guójiā — государство','外国 wàiguó — иностранное государство'] },
  { hanzi:'上', pinyin:'shàng',  translation:'вверх, на',              strokes:'3 черты',  examples:['上面 shàngmiàn — сверху','上学 shàngxué — идти в школу','马上 mǎshàng — сейчас, немедленно'] },
  { hanzi:'下', pinyin:'xià',    translation:'вниз, под',              strokes:'3 черты',  examples:['下面 xiàmiàn — внизу','下午 xiàwǔ — после полудня','下雨 xià yǔ — идёт дождь'] },
  { hanzi:'北', pinyin:'běi',    translation:'север',                  strokes:'5 черт',   examples:['北京 běijīng — Пекин','北方 běifāng — север','东北 dōngběi — северо-восток'] },
  { hanzi:'京', pinyin:'jīng',   translation:'столица',                strokes:'8 черт',   examples:['北京 běijīng — Пекин','南京 nánjīng — Нанкин','东京 dōngjīng — Токио'] },
  { hanzi:'文', pinyin:'wén',    translation:'письменность, культура', strokes:'4 черты',  examples:['中文 zhōngwén — китайский язык','文化 wénhuà — культура','文章 wénzhāng — статья'] },
  { hanzi:'字', pinyin:'zì',     translation:'иероглиф, символ',       strokes:'6 черт',   examples:['汉字 hànzì — китайский иероглиф','写字 xiě zì — писать','名字 míngzi — имя'] },
  { hanzi:'汉', pinyin:'hàn',    translation:'китайский (народ)',      strokes:'5 черт',   examples:['汉字 hànzì — иероглиф','汉语 hànyǔ — китайский язык','汉族 hànzú — народность хань'] },
  { hanzi:'语', pinyin:'yǔ',     translation:'язык, речь',             strokes:'14 черт',  examples:['中文/语 zhōngwén — китайский','口语 kǒuyǔ — разговорный язык','语法 yǔfǎ — грамматика'] },
  { hanzi:'名', pinyin:'míng',   translation:'имя, название',          strokes:'6 черт',   examples:['名字 míngzi — имя','名片 míngpiàn — визитная карточка','有名 yǒumíng — известный'] },
  { hanzi:'朋', pinyin:'péng',   translation:'друг (часть слова)',     strokes:'8 черт',   examples:['朋友 péngyou — друг','好朋友 hǎo péngyou — хороший друг','朋友圈 péngyou quān — круг друзей'] },
  { hanzi:'友', pinyin:'yǒu',    translation:'друг',                   strokes:'4 черты',  examples:['朋友 péngyou — друг','友好 yǒuhǎo — дружественный','友情 yǒuqíng — дружба'] },
];

const q = id => document.getElementById(id);
let lastMode = 'practice';
let activeCards = cards;
let selectedGroup = -1;
const GROUP_SIZE = 10;
const totalGroups = Math.ceil(cards.length / GROUP_SIZE);

/* ── navigation ── */
function hideAll() {
  q('mode-select').style.display = 'none';
  q('group-select').classList.remove('active');
  ['study-screen','practice-screen','match-screen','result-screen'].forEach(id => {
    q(id).classList.remove('active');
  });
  stopMatchTimer();
}

function goHome() {
  hideAll();
  q('mode-select').style.display = '';
}

function startMode(mode) {
  hideAll();
  lastMode = mode;
  showGroupSelect(mode);
}

function showGroupSelect(mode) {
  const modeNames = { study: 'Изучение', practice: 'Тренировка', match: 'Сопоставление' };
  q('group-mode-label').textContent = `${modeNames[mode]} — выберите группу`;
  const grid = q('group-grid');
  grid.innerHTML = '';

  for (let g = 0; g < totalGroups; g++) {
    const start = g * GROUP_SIZE;
    const end = Math.min(start + GROUP_SIZE, cards.length);
    const chars = cards.slice(start, end).map(c => c.hanzi).join('');
    const btn = document.createElement('button');
    btn.className = 'group-btn';
    btn.innerHTML = `<div class="group-num">Группа ${g + 1}</div><div class="group-chars">${chars}</div>`;
    btn.onclick = () => launchMode(mode, g);
    grid.appendChild(btn);
  }

  const allBtn = document.createElement('button');
  allBtn.className = 'group-btn-all';
  allBtn.textContent = `Все иероглифы (${cards.length})`;
  allBtn.onclick = () => launchMode(mode, -1);
  grid.appendChild(allBtn);

  q('group-select').classList.add('active');
}

function launchMode(mode, group) {
  hideAll();
  selectedGroup = group;
  if (group === -1) {
    activeCards = cards;
  } else {
    const start = group * GROUP_SIZE;
    const end = Math.min(start + GROUP_SIZE, cards.length);
    activeCards = cards.slice(start, end);
  }
  if (mode === 'study')    startStudy();
  if (mode === 'practice') startPractice();
  if (mode === 'match')    startMatch();
}

/* ══ STUDY ══ */
let sIdx = 0, sFlipped = false, sOrder = [];

function startStudy() {
  sIdx = 0; sFlipped = false;
  sOrder = activeCards.map((_, i) => i);
  buildDots('study-dots', 'study');
  loadStudyCard();
  q('study-screen').classList.add('active');
}

function studyShuffle() {
  sOrder = shuffle([...sOrder]);
  sIdx = 0; sFlipped = false;
  const btn = q('study-shuffle');
  btn.style.transform = 'scale(1.2) rotate(180deg)';
  btn.style.transition = 'transform 0.4s ease';
  setTimeout(() => { btn.style.transform = ''; }, 400);
  loadStudyCard();
}

function loadStudyCard() {
  const c = activeCards[sOrder[sIdx]];
  q('study-hanzi').textContent       = c.hanzi;
  q('study-pinyin').textContent      = c.pinyin;
  q('study-translation').textContent = c.translation;
  q('study-examples').innerHTML      = renderExamples(c.examples);
  q('study-strokes').textContent     = c.strokes;
  q('study-card').classList.remove('flipped');
  sFlipped = false;
  q('study-counter').textContent = `${sIdx + 1} / ${activeCards.length}`;
  q('study-prev').disabled = sIdx === 0;
  q('study-next').disabled = sIdx === activeCards.length - 1;
  refreshDots('study-dots', 'study', sIdx, null);
  popAnim(q('study-hanzi'));
}

function studyFlip() {
  sFlipped = !sFlipped;
  q('study-card').classList.toggle('flipped', sFlipped);
}

function studyNav(dir) {
  const next = sIdx + dir;
  if (next < 0 || next >= activeCards.length) return;
  sIdx = next;
  loadStudyCard();
}

/* ══ PRACTICE ══ */
let pQueue = [], pIdx = 0, pKnown = 0, pUnknown = 0, pFlipped = false;
let pStates = [];

function startPractice() {
  pQueue = [...activeCards].sort(() => Math.random() - 0.5);
  pIdx = 0; pKnown = 0; pUnknown = 0; pFlipped = false;
  pStates = new Array(activeCards.length).fill('');
  buildDots('prac-dots', 'prac');
  loadPracCard();
  q('practice-screen').classList.add('active');
}

function loadPracCard() {
  const c = pQueue[pIdx];
  q('prac-hanzi').textContent       = c.hanzi;
  q('prac-pinyin').textContent      = c.pinyin;
  q('prac-translation').textContent = c.translation;
  q('prac-examples').innerHTML      = renderExamples(c.examples);
  q('prac-strokes').textContent     = c.strokes;
  q('prac-card').classList.remove('flipped');
  pFlipped = false;
  q('prac-flip-wrap').classList.remove('hidden');
  q('prac-answer-btns').classList.add('hidden');
  q('prac-prog-text').textContent  = `Карточка ${pIdx + 1} из ${activeCards.length}`;
  q('prac-score-text').textContent = `✓ ${pKnown}  ✗ ${pUnknown}`;
  q('prac-prog-fill').style.width  = `${((pIdx + 1) / activeCards.length) * 100}%`;
  refreshDots('prac-dots', 'prac', pIdx, pStates);
  popAnim(q('prac-hanzi'));
}

function pracFlip() {
  if (pFlipped) return;
  pFlipped = true;
  q('prac-card').classList.add('flipped');
  q('prac-flip-wrap').classList.add('hidden');
  q('prac-answer-btns').classList.remove('hidden');
}

function pracAnswer(correct) {
  pStates[pIdx] = correct ? 'known' : 'unknown';
  if (correct) pKnown++; else pUnknown++;
  pIdx++;
  if (pIdx >= activeCards.length) showPracResult();
  else loadPracCard();
}

function showPracResult() {
  q('practice-screen').classList.remove('active');
  q('res-hanzi').textContent = '好！';
  q('res-score').textContent = `${pKnown} / ${activeCards.length}`;
  const total = activeCards.length;
  const pct = Math.round((pKnown / total) * 100);
  const msgs = [
    [100, '完美！Совершенно! Все иероглифы знаете!'],
    [80,  '很好！Отлично! Почти всё!'],
    [50,  '不错！Неплохо! Продолжайте практиковаться.'],
    [0,   '加油！Не сдавайтесь — ещё раз!'],
  ];
  q('res-msg').textContent = msgs.find(([m]) => pct >= m)[1];
  q('result-screen').classList.add('active');
}

/* ══ MATCH MODE ══ */
let mSelected = null;          // { el, type, idx }
let mMatched = 0;
let mWrong = 0;
let mTimerInterval = null;
let mStartTime = null;
let mShuffledIdx = [];         // shuffled indices for both columns

function startMatch() {
  mSelected = null; mMatched = 0; mWrong = 0;
  mShuffledIdx = shuffle([...Array(activeCards.length).keys()]);
  const meaningOrder = shuffle([...Array(activeCards.length).keys()]);

  const colH = q('col-hanzi');
  const colM = q('col-meaning');
  colH.innerHTML = ''; colM.innerHTML = '';

  mShuffledIdx.forEach((cardIdx, pos) => {
    const tile = document.createElement('div');
    tile.className = 'match-tile hanzi-tile';
    tile.textContent = activeCards[cardIdx].hanzi;
    tile.dataset.cardIdx = cardIdx;
    tile.dataset.col = 'hanzi';
    tile.dataset.pos = pos;
    tile.onclick = () => matchClick(tile);
    colH.appendChild(tile);
  });

  meaningOrder.forEach((cardIdx, pos) => {
    const tile = document.createElement('div');
    tile.className = 'match-tile meaning-tile';
    tile.textContent = activeCards[cardIdx].translation;
    tile.dataset.cardIdx = cardIdx;
    tile.dataset.col = 'meaning';
    tile.dataset.pos = pos;
    tile.onclick = () => matchClick(tile);
    colM.appendChild(tile);
  });

  buildDots('match-dots', 'match');
  refreshMatchDots();
  q('match-pairs-left').textContent = `Пар осталось: ${activeCards.length}`;
  startMatchTimer();
  q('match-screen').classList.add('active');
}

function matchClick(tile) {
  if (tile.classList.contains('matched') || tile.classList.contains('wrong-flash')) return;

  // clicking same tile = deselect
  if (mSelected && mSelected.el === tile) {
    tile.classList.remove('selected');
    mSelected = null;
    return;
  }

  // first selection
  if (!mSelected) {
    tile.classList.add('selected');
    mSelected = { el: tile, col: tile.dataset.col, cardIdx: +tile.dataset.cardIdx };
    return;
  }

  // second selection — must be different column
  if (mSelected.col === tile.dataset.col) {
    // swap selection to new tile in same column
    mSelected.el.classList.remove('selected');
    tile.classList.add('selected');
    mSelected = { el: tile, col: tile.dataset.col, cardIdx: +tile.dataset.cardIdx };
    return;
  }

  // check match
  const second = { el: tile, col: tile.dataset.col, cardIdx: +tile.dataset.cardIdx };
  const isMatch = mSelected.cardIdx === second.cardIdx;

  if (isMatch) {
    mSelected.el.classList.remove('selected');
    mSelected.el.classList.add('matched');
    second.el.classList.add('matched');
    mMatched++;
    mSelected = null;
    q('match-pairs-left').textContent = `Пар осталось: ${activeCards.length - mMatched}`;
    updateMatchDot(mMatched - 1);
    if (mMatched === activeCards.length) {
      setTimeout(showMatchResult, 600);
    }
  } else {
    mWrong++;
    mSelected.el.classList.remove('selected');
    [mSelected.el, second.el].forEach(el => {
      el.classList.add('wrong-flash');
      setTimeout(() => el.classList.remove('wrong-flash'), 420);
    });
    mSelected = null;
  }
}

function updateMatchDot(matchedCount) {
  const dot = q(`match-dot-${matchedCount}`);
  if (dot) dot.className = 'dot matched';
}

function refreshMatchDots() {
  activeCards.forEach((_, i) => {
    const d = q(`match-dot-${i}`);
    if (d) d.className = 'dot';
  });
}

/* timer */
function startMatchTimer() {
  stopMatchTimer();
  mStartTime = Date.now();
  mTimerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - mStartTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    const el = q('match-timer');
    el.textContent = `${m}:${String(s).padStart(2,'0')}`;
    el.classList.toggle('urgent', elapsed > 60);
  }, 500);
}

function stopMatchTimer() {
  if (mTimerInterval) { clearInterval(mTimerInterval); mTimerInterval = null; }
}

function showMatchResult() {
  stopMatchTimer();
  q('match-screen').classList.remove('active');
  const elapsed = Math.floor((Date.now() - mStartTime) / 1000);
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  const timeStr = m > 0 ? `${m} мин ${s} сек` : `${s} сек`;

  q('res-hanzi').textContent = '对！';
  q('res-score').textContent = timeStr;
  const accuracy = Math.round((activeCards.length / (activeCards.length + mWrong)) * 100);
  const msgs = [
    [100, `完美！Точность 100%! Ни одной ошибки!`],
    [80,  `很好！Точность ${accuracy}%. Отличный результат!`],
    [50,  `不错！Точность ${accuracy}%. Продолжайте тренироваться.`],
    [0,   `加油！Точность ${accuracy}%. Попробуйте ещё раз.`],
  ];
  q('res-msg').textContent = msgs.find(([min]) => accuracy >= min)[1];
  q('result-screen').classList.add('active');
}

/* ── shared result restart ── */
function restartLast() {
  q('result-screen').classList.remove('active');
  startMode(lastMode);
}

/* ── dots ── */
function buildDots(containerId, prefix) {
  q(containerId).innerHTML = activeCards.map((_, i) =>
    `<div class="dot" id="${prefix}-dot-${i}"></div>`).join('');
}

function refreshDots(containerId, prefix, current, states) {
  activeCards.forEach((_, i) => {
    const d = q(`${prefix}-dot-${i}`);
    if (!d) return;
    d.className = 'dot';
    if (i === current)      d.classList.add('current');
    else if (states && states[i]) d.classList.add(states[i]);
  });
}

/* ── utils ── */
function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

function renderExamples(examples) {
  return (examples || []).map(e =>
    `<div class="example-item">${e}</div>`
  ).join('');
}

function popAnim(el) {
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}

/* ── keyboard navigation ── */
document.addEventListener('keydown', e => {
  const studyActive   = q('study-screen').classList.contains('active');
  const practiceActive = q('practice-screen').classList.contains('active');

  if (studyActive) {
    if (e.key === 'ArrowLeft')  studyNav(-1);
    if (e.key === 'ArrowRight') studyNav(1);
    if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
      e.preventDefault();
      studyFlip();
    }
  }

  if (practiceActive) {
    if (!pFlipped) {
      if (e.key === ' ' || e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        pracFlip();
      }
    } else {
      if (e.key === 'ArrowRight' || e.key === 'Enter') pracAnswer(true);
      if (e.key === 'ArrowLeft'  || e.key === 'Backspace') pracAnswer(false);
    }
  }
});
</script>
